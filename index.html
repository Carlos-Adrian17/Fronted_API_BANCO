<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Banco Premium</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Mi Banco</h2>

    <button onclick="mostrar('dashboard')">🏠 Dashboard</button>
    <button onclick="mostrar('transfer')">💸 Transferencias</button>
    <button onclick="mostrar('pagos')">🧾 Pagos</button>
    <button onclick="mostrar('movimientos')">📊 Movimientos</button>

    <button onclick="logout()">🔴 Salir</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section">
    <h1>Saldo Disponible</h1>
    <h2 class="saldo">Q<span id="saldo">0.00</span></h2>

    <div class="card-bank">
        <p>Banco Premium</p>
        <h3 id="tarjeta"></h3>
        <p id="cvv"></p>
    </div>
</div>

<!-- TRANSFERENCIA -->
<div id="transfer" class="section hidden">
    <h2>Transferencia</h2>
    <input id="cuentaDestino" placeholder="Cuenta destino">
    <input id="montoTransfer" placeholder="Monto">
    <button onclick="transferir()">Transferir</button>
</div>

<!-- PAGOS -->
<div id="pagos" class="section hidden">
    <h2>Pago de Servicios</h2>
    <input id="pagoMonto" placeholder="Monto">
    <select id="tipoServicio">
        <option>Netflix</option>
        <option>Teléfono</option>
        <option>Donación</option>
    </select>
    <button onclick="pagar()">Pagar</button>
</div>

<!-- MOVIMIENTOS -->
<div id="movimientos" class="section hidden">
    <h2>Historial</h2>
    <ul id="listaMovimientos"></ul>
</div>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
