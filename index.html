<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Banca Privada Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="toast-container" class="toast-container"></div>

<!-- ================= AUTH ================= -->
<div id="auth-container" class="auth-container">
<div class="auth-card">

<div class="auth-header">
<div class="brand-logo">AURA</div>
<p class="brand-subtitle">BANCA PRIVADA</p>
</div>

<!-- ✅ LOGIN -->
<form id="form-login" class="auth-form active">
<h2>Iniciar Sesión</h2>

<div class="input-group">
<label>DPI</label>
<div class="input-wrapper">
<i class="fa-solid fa-id-card"></i>
<input id="login-dpi" required>
</div>
</div>

<div class="input-group">
<label>Password</label>
<div class="input-wrapper">
<i class="fa-solid fa-lock"></i>
<input type="password" id="login-password" required>
</div>
</div>

<button class="btn btn-primary btn-full">Ingresar</button>

<p class="auth-footer">
¿No tienes cuenta?
<a onclick="switchAuthForm('register')">Crear cuenta</a>
</p>

</form>

<!-- ✅ REGISTRO RESTAURADO -->
<form id="form-register" class="auth-form">

<h2>Crear Cuenta</h2>

<div class="input-group">
<input id="reg-name" placeholder="Nombre completo">
</div>

<div class="input-group">
<input id="reg-dpi" placeholder="DPI">
</div>

<div class="input-group">
<input id="reg-email" placeholder="Correo">
</div>

<div class="input-group">
<input id="reg-telefono" placeholder="Teléfono">
</div>

<div class="input-group">
<input id="reg-direccion" placeholder="Dirección">
</div>

<div class="input-group">
<input type="password" id="reg-password" placeholder="Password">
</div>

<button class="btn btn-primary btn-full">Registrarse</button>

<p class="auth-footer">
<a onclick="switchAuthForm('login')">Volver</a>
</p>

</form>

</div>
</div>

<!-- ================= APP ================= -->
<div id="main-app" class="app-container hidden">

<aside class="sidebar">

<div class="sidebar-brand">
<span class="logo-text">AURA</span>
</div>

<nav class="sidebar-menu">

<a class="menu-item active" onclick="navigateToView('view-dashboard')">
<i class="fa-solid fa-chart-pie"></i>
Dashboard Global
</a>

<a class="menu-item" onclick="navigateToView('view-payments')">
<i class="fa-solid fa-wallet"></i>
Pago de Servicios
</a>

<a class="menu-item" onclick="navigateToView('view-transfers')">
<i class="fa-solid fa-arrow-right-arrow-left"></i>
Transferencias
</a>

</nav>

</aside>

<main class="main-content">

<header class="main-header">
<h1 id="greeting"></h1>
</header>

<!-- ================= DASHBOARD ================= -->
<section id="view-dashboard" class="app-view active">

<div class="grid-dashboard">

<div class="card card-balance">
<span>Balance Total</span>
<h2 id="dashboard-balance">Q0.00</h2>
<p id="nombre-cliente"></p>
<p>CVV: <span id="cvv"></span></p>
</div>

<!-- ✅ GRAFICO (como antes) -->
<div class="card">
<h3>Análisis Financiero</h3>
<canvas id="analytics-chart"></canvas>
</div>

</div>

</section>


<!-- ================= PAGOS ================= -->
<section id="view-payments" class="app-view">

<h2>Servicios</h2>

<div class="services-interactive-grid">

<div class="card service-tile" onclick="navigateToView('view-entertainment')">
<i class="fa-solid fa-film service-icon-premium"></i>
<h4>Entretenimiento</h4>
</div>

</div>

</section>

<!-- ✅ ENTRETENIMIENTO CORRECTO -->
<section id="view-entertainment" class="app-view">

<h2>Pagos de Entretenimiento</h2>

<div class="services-interactive-grid">

<!-- ✅ ARREGLO REAL DE NETFLIX -->
<div class="card service-tile" onclick="pagarEntretenimiento(1)">
<i class="fa-brands fa-netflix" style="color:#e50914;font-size:30px;"></i>
<h4>Netflix</h4>
</div>

<div class="card service-tile" onclick="pagarEntretenimiento(2)">
<i class="fa-solid fa-tv"></i>
<h4>HBO</h4>
</div>

<div class="card service-tile" onclick="pagarEntretenimiento(3)">
<i class="fa-solid fa-film"></i>
<h4>Paramount</h4>
</div>

</div>

<button class="btn btn-primary" onclick="cargarHistorialPagos()">
Ver historial de pagos
</button>

<div id="resultado-entretenimiento"></div>
<div id="tabla-pagos"></div>

</section>

<!-- ✅ TRANSFERENCIAS SIN CAMBIOS -->
<section id="view-transfers" class="app-view">

<div class="card max-w-md">

<form id="form-transfer">

<input id="transfer-account" placeholder="Cuenta destino">
<input type="number" id="transfer-amount" placeholder="Monto">

<button class="btn btn-primary btn-full">
Transferir
</button>

</form>

</div>

</section>

</main>
</div>

<script src="app.js"></script>

</body>
</html>
