<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AURA — Banca Privada Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="toast-container" class="toast-container"></div>

<!-- ================= AUTH ================= -->
<div id="auth-container" class="auth-container">
<div class="auth-card">

<div class="auth-header">
<div class="brand-logo">AURA</div>
<p class="brand-subtitle">BANCA PRIVADA</p>
</div>

<form id="form-login" class="auth-form active">
<h2>Iniciar Sesión</h2>

<div class="input-group">
<label>DPI</label>
<div class="input-wrapper">
<i class="fa-solid fa-id-card"></i>
<input id="login-dpi" required>
</div>
</div>

<div class="input-group">
<label>Password</label>
<div class="input-wrapper">
<i class="fa-solid fa-lock"></i>
<input type="password" id="login-password" required>
</div>
</div>

<button class="btn btn-primary btn-full">Ingresar</button>
</form>

</div>
</div>

<!-- ================= APP ================= -->
<div id="main-app" class="app-container hidden">

<aside class="sidebar">

<div class="sidebar-brand">
<span class="logo-text">AURA</span>
</div>

<nav class="sidebar-menu">

<a class="menu-item active" data-target="view-dashboard" onclick="navigateToView('view-dashboard')">
<i class="fa-solid fa-chart-pie"></i>
<span>Dashboard Global</span>
</a>

<a class="menu-item" data-target="view-payments" onclick="navigateToView('view-payments')">
<i class="fa-solid fa-wallet"></i>
<span>Pago de Servicios</span>
</a>

<a class="menu-item" data-target="view-transfers" onclick="navigateToView('view-transfers')">
<i class="fa-solid fa-arrow-right-arrow-left"></i>
<span>Transferencias</span>
</a>

</nav>

</aside>

<!-- MAIN -->
<main class="main-content">

<header class="main-header">
<h1 id="greeting"></h1>
</header>

<!-- ================= DASHBOARD ================= -->
<section id="view-dashboard" class="app-view active">

<div class="grid-dashboard">

<div class="card card-balance">

<span class="card-label">Balance Total</span>
<h2 id="dashboard-balance">Q0.00</h2>

<div>
<span id="numero-cuenta"></span>
</div>

<p id="nombre-cliente"></p>
<p>CVV: <span id="cvv"></span></p>

</div>

<!-- ✅ GRAFICO RESTAURADO -->
<div class="card card-chart-container">
<h3>Análisis Financiero</h3>
<canvas id="analytics-chart"></canvas>
</div>

</div>

<!-- ✅ BOTON DEPOSITO (NUEVO) -->
<div class="quick-actions-grid">

<button class="quick-btn" onclick="navigateToView('view-deposito')">
<i class="fa-solid fa-money-bill"></i>
Depositar
</button>

<button class="quick-btn" onclick="navigateToView('view-payments')">
<i class="fa-solid fa-receipt"></i>
Servicios
</button>

</div>

<div class="card">
<h3>Movimientos</h3>

<table class="premium-table">
<thead>
<tr>
<th>Tipo</th>
<th>Fecha</th>
<th>Monto</th>
</tr>
</thead>
<tbody id="transactions-log"></tbody>
</table>

</div>

</section>

<!-- ✅ NUEVA VISTA DEPOSITO -->
<section id="view-deposito" class="app-view">

<h2>Depósito</h2>

<div class="card max-w-md">

<form id="form-deposito">

<input type="number" placeholder="Monto" id="deposito-monto">

<button class="btn btn-primary">Depositar</button>

</form>

</div>

</section>

<!-- ================= PAGOS ================= -->
<section id="view-payments" class="app-view">

<h2>Servicios</h2>

<div class="services-interactive-grid">

<div class="card service-tile" onclick="navigateToView('view-entertainment')">
<i class="fa-solid fa-play service-icon-premium netflix-big"></i>
<h4>Entretenimiento</h4>
</div>

</div>

</section>

<!-- ================= ENTRETENIMIENTO ================= -->
<section id="view-entertainment" class="app-view">

<h2>Pagos de Entretenimiento</h2>

<div class="services-interactive-grid">

<!-- ✅ NETFLIX ARREGLADO -->
<div class="card service-tile" onclick="pagarEntretenimiento(1)">
<i class="fa-brands fa-netflix netflix-strong"></i>
<h4>Netflix</h4>
</div>

<div class="card service-tile" onclick="pagarEntretenimiento(2)">
<i class="fa-solid fa-tv"></i>
<h4>HBO</h4>
</div>

<div class="card service-tile" onclick="pagarEntretenimiento(3)">
<i class="fa-solid fa-film"></i>
<h4>Paramount</h4>
</div>

</div>

<button class="btn btn-primary" onclick="cargarHistorialPagos()">Ver historial de pagos</button>

<div id="resultado-entretenimiento"></div>
<div id="tabla-pagos"></div>

</section>

<!-- ✅ TRANSFERENCIAS (INTACTO COMO PEDISTE) -->
<section id="view-transfers" class="app-view">

<div class="card max-w-md">

<form id="form-transfer">

<div class="input-group">
<label>Cuenta destino</label>
<input id="transfer-account">
</div>

<div class="input-group">
<label>Monto</label>
<input type="number" id="transfer-amount">
</div>

<button class="btn btn-primary btn-full">Transferir</button>

</form>

</div>

</section>

</main>
</div>

<script src="app.js"></script>

</body>
</html>
